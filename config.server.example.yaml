server:
  gateway_addr: ":19080"
  grpc_addr: ":18000"
  grpc_target: "127.0.0.1:18000"
  endpoint_host: "jjai.top"
  read_header_timeout: "5s"

mysql:
  user: "spider"
  password: "Spider1022.."
  host: "127.0.0.1"
  port: 3306
  database: "spider"
  charset: "utf8mb4"
  parse_time: true
  loc: "Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "1h"
  conn_max_idle_time: "10m"
  log_level: "warn"

session:
  sign_secret: "spider-sign-session-secret"
  default_ttl: "8760h"

auth:
  public_grpc_method_prefixes:
    - "/uc."
    - "/api.AdminVIPApi/"
    - "/api.AppUpdateService/"

sign:
  enabled: true
  replay_nonce_ttl: "60s"
  replay_nonce_cleanup: "5s"
  log_metadata_prefix_only: true

apple_sign_in:
  team_id: "XLVU7GGT6N"
  key_id: "5LFYA472TZ"
  client_id: "hh.spider"
  private_key_path: "/root/app/spiderapi/spider-secrets/AuthKey_5LFYA472TZ.p8"
  client_secret_ttl: "24h"

app_store:
  bundle_id: "hh.spider"
  # 正式上架使用 PRODUCTION；沙盒/TestFlight 联调时可临时改为 SANDBOX。
  environment: "PRODUCTION"
  app_apple_id: 6776698752
  enable_online_checks: true
  node_path: "node"
  verifier_script_path: "apple_iap_verifier/verify_transaction.mjs"
  api_script_path: "apple_iap_verifier/app_store_api.mjs"
  root_certificate_paths:
    - "/root/app/spiderapi/spider-secrets/apple-root-certs/AppleRootCA-G2.cer"
    - "/root/app/spiderapi/spider-secrets/apple-root-certs/AppleRootCA-G3.cer"
  # 主动对账需要 App Store Connect 里有 App 内购买权限的 App Store Server API Key。
  # 填好 api_key_id/api_issuer_id/api_private_key_path 后，再把 reconcile_enabled 改成 true。
  api_key_id: ""
  api_issuer_id: ""
  api_private_key_path: ""
  monthly_product_id: "hh.spider.vip.monthly"
  lifetime_product_id: "hh.spider.vip.lifetime"
  timeout: "10s"
  reconcile_enabled: false
  reconcile_interval: "6h"
  reconcile_lookback: "720h"
  reconcile_batch_size: 50
  reconcile_max_pages: 10

app_update:
  # 留空表示不提示更新；低于 ios_min_supported_version 的客户端会强制更新。
  ios_latest_version: ""
  ios_min_supported_version: ""
  force_update_enabled: false
  update_available_enabled: true
  ios_app_store_url: "https://apps.apple.com/app/id6776698752"
  message_zh_hans: "请更新到最新版本后继续使用"
  message_zh_hant: "請更新到最新版本後繼續使用"
  message_en: "Please update to the latest version to continue."
  message_ja: "続行するには最新バージョンにアップデートしてください。"
  message_ko: "계속 사용하려면 최신 버전으로 업데이트해 주세요."

admin:
  # 后台开通 VIP 的共享密钥。admin_vip_cli 默认读取这里，线上必须设置为足够长的随机值。
  vip_grant_secret: "33cd455954929525a026ad9b53721021dc2f6b61c01de86f6158f189dd0d66db"

logger:
  level: "info"
  path: "/root/app/spiderapi/log/info/spider-server.log"
  error_path: "/root/app/spiderapi/log/error/spider-server.log"
  format: "plain"
  rotate: "%Y%m%d"
  max_age: "168h"
  rotation_time: "24h"
  max_size_mb: 100

client:
  gateway_base_url: "https://jjai.top"
  timeout: "10s"
  sign_salt: ""
