<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>lifttags · pro 回复生成器</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">LIFTTAGS · GIVEAWAY DESK</p>
        <h1>pro 回复生成器</h1>
        <p class="lede">输入 CSV 序号或兑换码，生成可直接发送的英文回复。</p>
      </div>
      <div class="status-pill"><span></span>本地服务</div>
    </header>

    <section class="stats" aria-label="兑换码状态">
      <article>
        <span>历史最大 ID</span>
        <strong id="max-id">—</strong>
      </article>
      <article>
        <span>建议下一个</span>
        <strong id="next-id">—</strong>
      </article>
      <article>
        <span>已生成 / 总数</span>
        <strong><b id="generated-count">—</b><i>/</i><b id="total-count">—</b></strong>
      </article>
    </section>

    <section class="workspace">
      <article class="input-panel">
        <div class="section-heading">
          <span>01</span>
          <div>
            <h2>选择兑换码</h2>
            <p>输入数字 ID，或直接粘贴完整兑换码。</p>
          </div>
        </div>

        <form id="reply-form">
          <label for="offer-input">兑换序号 ID / 兑换码</label>
          <div class="input-row">
            <input id="offer-input" name="input" autocomplete="off" spellcheck="false" placeholder="例如：6" required autofocus>
            <button type="button" class="next-button" id="use-next">填入下一个</button>
          </div>
          <button type="submit" class="generate-button" id="generate-button">
            <span>生成回复</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </form>
        <p class="error-message" id="error-message" role="alert"></p>
        <div class="privacy-note">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l8 4v5c0 5-3.4 8-8 9-4.6-1-8-4-8-9V7l8-4zM9 12l2 2 4-4"/></svg>
          数据仅在你的电脑本地处理
        </div>
      </article>

      <article class="output-panel">
        <div class="section-heading output-heading">
          <span>02</span>
          <div>
            <h2>复制回复</h2>
            <p id="result-meta">生成后，完整文案会出现在这里。</p>
          </div>
          <button type="button" class="copy-button" id="copy-button" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2"/></svg>
            <span>复制全文</span>
          </button>
        </div>
        <textarea id="reply-output" readonly aria-label="生成的英文回复" placeholder="等待生成回复…"></textarea>
      </article>
    </section>

    <footer>lifttags internal tool · 兑换码不会上传到第三方</footer>
  </main>
  <div class="toast" id="toast" role="status">已复制到剪贴板</div>
  <script src="/app.js" defer></script>
</body>
</html>
