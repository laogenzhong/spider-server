syntax = "proto3";

package health;

option go_package = "spider/api;api";

// WeeklyTrainingGoal 表示用户每周训练目标。
message WeeklyTrainingGoal {
  uint64 id = 1;
  uint64 uid = 2;
  int32 strength_sessions = 3;
  int32 cardio_sessions = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message GetWeeklyTrainingGoalRequest {
}

message GetWeeklyTrainingGoalResponse {
  WeeklyTrainingGoal goal = 1;
}

message SaveWeeklyTrainingGoalRequest {
  int32 strength_sessions = 1;
  int32 cardio_sessions = 2;
}

message SaveWeeklyTrainingGoalResponse {
  WeeklyTrainingGoal goal = 1;
}

service WeeklyTrainingGoalService {
  rpc GetWeeklyTrainingGoal(GetWeeklyTrainingGoalRequest) returns (GetWeeklyTrainingGoalResponse);
  rpc SaveWeeklyTrainingGoal(SaveWeeklyTrainingGoalRequest) returns (SaveWeeklyTrainingGoalResponse);
}
