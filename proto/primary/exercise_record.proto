syntax = "proto3";

package api;

option go_package = "spider/api;api";

enum ExerciseWeightUnit {
  EXERCISE_WEIGHT_UNIT_JIN = 0;
  EXERCISE_WEIGHT_UNIT_KG = 1;
  EXERCISE_WEIGHT_UNIT_LB = 2;
}

message ExerciseSetRecord {
  uint64 id = 1;
  uint64 uid = 2;
  string exercise_id = 3;
  string exercise_name_key = 4;
  string exercise_name_snapshot = 5;
  string category_key = 6;
  string type_key = 7;
  int32 weight_x10 = 8;
  ExerciseWeightUnit weight_unit = 9;
  int32 reps = 10;
  int64 recorded_at = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
  string client_record_id = 14;
  // session_id makes a set belong to one completed training session. It lets
  // clients restore or delete that session without inferring membership from
  // a time range.
  string session_id = 15;
}

// WorkoutDataSnapshotKind 区分计划库快照和一次已结束训练快照。
enum WorkoutDataSnapshotKind {
  WORKOUT_DATA_SNAPSHOT_KIND_UNKNOWN = 0;
  WORKOUT_DATA_SNAPSHOT_KIND_LIBRARY = 1;
  WORKOUT_DATA_SNAPSHOT_KIND_TRAINING_SESSION = 2;
  WORKOUT_DATA_SNAPSHOT_KIND_PLAN_FOLDER = 3;
  WORKOUT_DATA_SNAPSHOT_KIND_PLAN = 4;
  WORKOUT_DATA_SNAPSHOT_KIND_LIBRARY_METADATA = 5;
}

message WorkoutPlanExerciseSetSnapshot {
  string id = 1;
  string weight_text = 2;
  string reps_text = 3;
}

message WorkoutPlanExerciseSnapshot {
  string id = 1;
  string exercise_id = 2;
  string name_key = 3;
  string name_snapshot = 4;
  string category_key = 5;
  string type_key = 6;
  string display_type_key = 7;
  string custom_name = 8;
  string custom_subcategory_key = 9;
  string note = 10;
  int32 set_count = 11;
  string weight_unit = 12;
  repeated WorkoutPlanExerciseSetSnapshot sets = 13;
  // 自定义动作作者填写的介绍；内置动作保持为空。
  string custom_introduction = 14;
}

message WorkoutPlanSnapshot {
  string id = 1;
  string title = 2;
  repeated WorkoutPlanExerciseSnapshot exercises = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message WorkoutPlanFolderSnapshot {
  string id = 1;
  string title = 2;
  repeated WorkoutPlanSnapshot plans = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int32 sort_index = 6;
}

// WorkoutPlanFolderEntitySnapshot 是不包含计划正文的文件夹增量实体。
message WorkoutPlanFolderEntitySnapshot {
  string id = 1;
  string title = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
  int32 sort_index = 5;
  repeated string plan_ids = 6;
}

// WorkoutPlanEntitySnapshot 表示一个计划及其所属文件夹和排序位置。
message WorkoutPlanEntitySnapshot {
  string folder_id = 1;
  WorkoutPlanSnapshot plan = 2;
  int32 sort_index = 3;
}

// WorkoutLibrarySnapshot 是动作、计划和文件夹管理的完整客户端快照。
message WorkoutLibrarySnapshot {
  repeated CustomExercise custom_exercises = 1;
  repeated WorkoutPlanFolderSnapshot folders = 2;
  int64 changed_at = 3;
  repeated string folder_ids = 4;
}

message WorkoutPlanRecordLinkSnapshot {
  string id = 1;
  string client_record_id = 2;
  string plan_id = 3;
  string plan_exercise_id = 4;
  string exercise_id = 5;
  int64 created_at = 6;
}

// WorkoutTrainingSessionSnapshot 一次提交整次训练及其全部动作组和计划关联。
message WorkoutTrainingSessionSnapshot {
  string session_id = 1;
  string plan_id = 2;
  string plan_title = 3;
  bool standalone = 4;
  int64 started_at = 5;
  int64 ended_at = 6;
  repeated ExerciseSetRecord records = 7;
  repeated WorkoutPlanRecordLinkSnapshot record_links = 8;
  ExerciseTrainingSessionEndMarker end_marker = 9;
}

// WorkoutDataSnapshot 是队列和恢复服务共用的快照载体。
message WorkoutDataSnapshot {
  uint64 id = 1;
  uint64 uid = 2;
  string client_snapshot_id = 3;
  WorkoutDataSnapshotKind kind = 4;
  string entity_id = 5;
  int64 changed_at = 6;
  WorkoutLibrarySnapshot library = 7;
  WorkoutTrainingSessionSnapshot training_session = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
  WorkoutPlanFolderEntitySnapshot plan_folder = 11;
  WorkoutPlanEntitySnapshot plan_entity = 12;
  bool deleted = 13;
}

message CustomExercise {
  uint64 id = 1;
  uint64 uid = 2;
  string local_id = 3;
  string name = 4;
  string category_key = 5;
  string type_key = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
  string subcategory_key = 9;
  // 用户为自定义动作填写的介绍。
  string introduction = 10;
}

message ExerciseTrainingSessionEndMarker {
  uint64 id = 1;
  uint64 uid = 2;
  string client_marker_id = 3;
  int64 ended_at = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message SaveExerciseSetRecordRequest {
  string exercise_id = 1;
  string exercise_name_key = 2;
  string exercise_name_snapshot = 3;
  string category_key = 4;
  string type_key = 5;
  int32 weight_x10 = 6;
  ExerciseWeightUnit weight_unit = 7;
  int32 reps = 8;
  int64 recorded_at = 9;
}

message SaveExerciseSetRecordResponse {
  ExerciseSetRecord record = 1;
}

message ListExerciseSetRecordsRequest {
  string exercise_id = 1;
  int32 page_size = 2;
  string cursor = 3;
}

message ListExerciseSetRecordsResponse {
  repeated ExerciseSetRecord records = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message ListExerciseSetRecordsByTimeRangeRequest {
  int64 start_at = 1;
  int64 end_at = 2;
}

message ListExerciseSetRecordsByTimeRangeResponse {
  repeated ExerciseSetRecord records = 1;
}

message UpdateExerciseSetRecordRequest {
  uint64 id = 1;
  string exercise_name_key = 2;
  string exercise_name_snapshot = 3;
  string category_key = 4;
  string type_key = 5;
  int32 weight_x10 = 6;
  ExerciseWeightUnit weight_unit = 7;
  int32 reps = 8;
  int64 recorded_at = 9;
  string exercise_id = 10;
}

message UpdateExerciseSetRecordResponse {
  ExerciseSetRecord record = 1;
}

message DeleteExerciseSetRecordRequest {
  uint64 id = 1;
}

message DeleteExerciseSetRecordResponse {
  bool success = 1;
}

message ListTodayExerciseHistoryRequest {
  string record_date = 1;
}

message TodayExerciseHistoryItem {
  string exercise_id = 1;
  string exercise_name_key = 2;
  string exercise_name_snapshot = 3;
  string category_key = 4;
  string type_key = 5;
  int32 set_count = 6;
  int32 max_weight_x10 = 7;
  ExerciseWeightUnit weight_unit = 8;
  int64 latest_recorded_at = 9;
  repeated ExerciseSetRecord latest_records = 10;
}

message ListTodayExerciseHistoryResponse {
  repeated TodayExerciseHistoryItem items = 1;
}

message SaveCustomExerciseRequest {
  CustomExercise exercise = 1;
}

message SaveCustomExerciseResponse {
  CustomExercise exercise = 1;
}

message ListCustomExercisesRequest {
}

message ListCustomExercisesResponse {
  repeated CustomExercise exercises = 1;
}

message SaveExerciseTrainingSessionEndMarkerRequest {
  string client_marker_id = 1;
  int64 ended_at = 2;
}

message SaveExerciseTrainingSessionEndMarkerResponse {
  ExerciseTrainingSessionEndMarker marker = 1;
}

message ListExerciseTrainingSessionEndMarkersRequest {
  int64 start_at = 1;
  int64 end_at = 2;
}

message ListExerciseTrainingSessionEndMarkersResponse {
  repeated ExerciseTrainingSessionEndMarker markers = 1;
}

message SyncWorkoutDataSnapshotsRequest {
  repeated WorkoutDataSnapshot snapshots = 1;
}

message SyncWorkoutDataSnapshotsResponse {
  repeated string accepted_client_snapshot_ids = 1;
}

service ExerciseSetRecordService {
  rpc SaveExerciseSetRecord(SaveExerciseSetRecordRequest) returns (SaveExerciseSetRecordResponse);
  rpc ListExerciseSetRecords(ListExerciseSetRecordsRequest) returns (ListExerciseSetRecordsResponse);
  rpc ListExerciseSetRecordsByTimeRange(ListExerciseSetRecordsByTimeRangeRequest) returns (ListExerciseSetRecordsByTimeRangeResponse);
  rpc UpdateExerciseSetRecord(UpdateExerciseSetRecordRequest) returns (UpdateExerciseSetRecordResponse);
  rpc DeleteExerciseSetRecord(DeleteExerciseSetRecordRequest) returns (DeleteExerciseSetRecordResponse);
  rpc ListTodayExerciseHistory(ListTodayExerciseHistoryRequest) returns (ListTodayExerciseHistoryResponse);
  rpc SaveCustomExercise(SaveCustomExerciseRequest) returns (SaveCustomExerciseResponse);
  rpc ListCustomExercises(ListCustomExercisesRequest) returns (ListCustomExercisesResponse);
  rpc SaveExerciseTrainingSessionEndMarker(SaveExerciseTrainingSessionEndMarkerRequest) returns (SaveExerciseTrainingSessionEndMarkerResponse);
  rpc ListExerciseTrainingSessionEndMarkers(ListExerciseTrainingSessionEndMarkersRequest) returns (ListExerciseTrainingSessionEndMarkersResponse);
  rpc SyncWorkoutDataSnapshots(SyncWorkoutDataSnapshotsRequest) returns (SyncWorkoutDataSnapshotsResponse);
}
