syntax = "proto3";
// 登录
// 注册
// token
// 剩下的就全是业务了

package uc;

import "google/protobuf/empty.proto";
option go_package = "spider/api;api";

/**
   * 登录流程
     注册（注册了serverId）   登录（返回jwtToken） -> token（重连返回jwtToken）  -> 选择serverId（调试进入多个服务器，返回jwtToken）
     游客登录（返回jwtToken）  -> token（重连返回jwtToken）  -> 选择serverId（调试进入多个服务器，返回jwtToken）
     jwtToken(登录gateway) 连接game登录服务器
*/
// 登录 uc token 是 http 用的 jwt token 是 ws 用的
service SignApi {
  // 注册
  rpc signUpMixed(SignInRequest) returns (SignUpMixedResponse);
  // 登录
  rpc signIn(SignInRequest) returns (SignInResponse);
  // Apple 登录
  rpc signInWithApple(AppleSignInRequest) returns (SignInResponse);
  //  ucToken 重连
  rpc token(TokenRequest) returns (SignInResponse);
  // 退出登录
  rpc signOut(google.protobuf.Empty) returns (google.protobuf.Empty);
  // 删除账号
  rpc deleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}

message SignInRequest {
  string account = 1;
  string pwd = 2;
  SignInParams params = 3;
}

message TokenRequest {}

message DeleteAccountRequest {
  // 用户在客户端输入的确认词，例如 DELETE 或 删除账号。
  string confirm_text = 1;
  // 是否已确认删除后数据可能无法恢复。
  bool acknowledge_data_loss = 2;
  // 使用 Sign in with Apple 的账号是否同步处理 Apple 登录授权/令牌。
  bool revoke_apple_sign_in = 3;
  // 可选删除原因。
  string reason = 4;
}

message DeleteAccountResponse {
  bool success = 1;
  string message = 2;
  // 是否进入延迟删除队列。
  bool deletion_scheduled = 3;
  // 预计完成时间戳，秒级 Unix time。0 表示无预计时间。
  int64 expected_complete_at = 4;
}

message SignUpMixedResponse {
  uint32 code = 1;
}

message SignInParams {
  string uuid = 8;
}

message AppleSignInRequest {
  // Apple 返回的 identityToken/JWT。
  string identity_token = 1;
  // Apple 返回的一次性授权码，用于服务器换 refresh_token。
  string authorization_code = 2;
  // 客户端发起 Apple 登录时使用的 nonce 原文。
  string nonce = 3;
  // 首次授权时客户端可透传的 email，服务器会优先使用 token 内 email。
  string email = 4;
  // 首次授权时客户端可透传的用户名称。
  string full_name = 5;
}

message SignInResponse {
  uint64 uid = 1;
  // 用于请求 uc 用
  string uc_token = 2;
  // app name
  string app_key = 11;
  // gateway token
  string jwt_token = 12;
  // ws Url
  string ws_url = 18;
}
