syntax = "proto3";

package api;

option go_package = "spider/api;api";

// FriendListItem 表示好友列表中的轻量好友信息。
// 仅用于好友列表展示，不包含详细训练数据。
message FriendListItem {
  // 用户服务内部 uid。
  uint64 uid = 1;
  // 用户对外展示/搜索用的好友 ID。
  string user_id = 2;
  // 用户展示昵称。
  string nickname = 3;
  // 客户端内置 SF Symbols 头像名。
  string avatar_symbol = 4;
  // 用户个人简介。
  string bio = 5;
  // 是否公开训练数据。
  bool training_data_visible = 6;
  // 连续训练天数。
  int32 spark_days = 7;
  // 快照更新时间，Unix 毫秒。
  int64 snapshot_updated_at = 8;
  // 当前用户给该好友设置的备注名，仅自己可见。
  string remark = 9;
}

// FriendProfile 表示好友列表和朋友资料页展示的用户资料。
// 该结构既可用于展示好友，也可用于返回当前用户的朋友资料。
message FriendProfile {
  // 用户服务内部 uid。
  uint64 uid = 1;
  // 用户对外展示/搜索用的好友 ID。
  string user_id = 2;
  // 用户展示昵称，可由用户在“我的-朋友资料”里修改。
  string nickname = 3;
  // 客户端内置 SF Symbols 头像名，例如 person.fill。
  string avatar_symbol = 4;
  // 用户个人简介。
  string bio = 5;
  // 用户自定义训练计划标题。
  string plan_title = 6;
  // 用户自定义训练计划说明。
  string plan_description = 7;
  // 公开训练数据中的近 30 次训练摘要。
  repeated FriendTrainingDaySummary recent_training_days = 8;
  // 好友关系创建时间，Unix 毫秒。
  int64 created_at = 9;
  // 更新时间，Unix 毫秒。
  int64 snapshot_updated_at = 10;
}

// FriendRequest 表示一条好友申请。
message FriendRequest {
  // 好友申请 ID，处理申请时传回该 ID。
  string id = 1;
  // 申请发起人的 uid。
  uint64 from_uid = 2;
  // 申请发起人的对外好友 ID。
  string from_user_id = 3;
  // 申请发起人的展示昵称。
  string nickname = 4;
  // 申请发起人的内置头像名。
  string avatar_symbol = 5;
  // 申请附带文案。
  string message = 6;
  // 当前申请状态。
  FriendRequestStatus status = 7;
  // 申请创建时间，Unix 毫秒。
  int64 created_at = 8;
  // 申请处理时间，未处理时为 0。
  int64 handled_at = 9;
}

enum FriendRequestStatus {
  // 未知状态，客户端按未处理展示以外的兜底状态处理。
  FRIEND_REQUEST_STATUS_UNKNOWN = 0;
  // 待处理。
  FRIEND_REQUEST_STATUS_PENDING = 1;
  // 已同意。
  FRIEND_REQUEST_STATUS_ACCEPTED = 2;
  // 已拒绝。
  FRIEND_REQUEST_STATUS_REJECTED = 3;
}

// FriendTrainingTagStat 表示某一天内一个训练标签或默认训练名称的热量统计。
message FriendTrainingTagStat {
  // 标签名称；如果训练没有标签，客户端会使用训练默认名称。
  string name = 1;
  // 该标签或训练名称对应的消耗热量，单位 kcal。
  string calories = 2;
}

// FriendTrainingDaySummary 表示好友近 30 次训练中的某一天训练摘要。
message FriendTrainingDaySummary {
  // 日期，格式 yyyy-MM-dd，按用户本地日历聚合。
  string record_date = 1;
  // 当天训练标签/默认训练名称的热量拆分。
  repeated FriendTrainingTagStat tags = 2;
  // 当天总消耗热量，单位 kcal。
  string calories = 3;
  // 当天可下钻的动作训练；仅最近 7 个训练日携带，服务端会限制数量与快照体积。
  repeated FriendActionTrainingSession action_training_sessions = 4;
}

// FriendActionWeightUnit 表示好友动作组中公开的重量单位。
enum FriendActionWeightUnit {
  FRIEND_ACTION_WEIGHT_UNIT_UNKNOWN = 0;
  FRIEND_ACTION_WEIGHT_UNIT_KG = 1;
  FRIEND_ACTION_WEIGHT_UNIT_LB = 2;
}

// FriendActionSetSummary 表示一个公开动作组的基础数据。
message FriendActionSetSummary {
  // 用户录入重量乘 10；有氧器械动作可为 0。
  int32 weight_x10 = 1;
  FriendActionWeightUnit weight_unit = 2;
  // 力量动作为次数，有氧器械动作为分钟数。
  int32 reps = 3;
}

// FriendActionExerciseSummary 表示一次动作训练中的一个动作及其组数。
message FriendActionExerciseSummary {
  string exercise_id = 1;
  string name_key = 2;
  string name_snapshot = 3;
  string category_key = 4;
  string type_key = 5;
  repeated FriendActionSetSummary sets = 6;
  string custom_name = 7;
  string custom_subcategory_key = 8;
  string custom_introduction = 9;
}

// FriendBoundWorkoutSummary 表示与动作训练时间重叠的 HealthKit 运动基础数据。
// 不包含心率、路线、备注或 HealthKit UUID。
message FriendBoundWorkoutSummary {
  string workout_type = 1;
  int64 start_at = 2;
  int64 end_at = 3;
  int32 duration_seconds = 4;
  double energy_kcal = 5;
  double distance_meters = 6;
  bool has_distance = 7;
  repeated string tags = 8;
}

enum FriendActionTrainingKind {
  FRIEND_ACTION_TRAINING_KIND_UNKNOWN = 0;
  FRIEND_ACTION_TRAINING_KIND_STRENGTH = 1;
  FRIEND_ACTION_TRAINING_KIND_CARDIO = 2;
  FRIEND_ACTION_TRAINING_KIND_MIXED = 3;
}

// FriendActionTrainingSession 是好友可见的一次只读动作训练摘要。
message FriendActionTrainingSession {
  // 仅用于好友资料页列表稳定标识，不是服务端训练快照主键。
  string session_id = 1;
  int64 start_at = 2;
  int64 end_at = 3;
  FriendActionTrainingKind kind = 4;
  repeated FriendActionExerciseSummary exercises = 5;
  // 仅当该动作训练与某次 HealthKit 运动重叠时存在。
  FriendBoundWorkoutSummary bound_workout = 6;
}

// FriendSharedPlanSet 是好友分享计划中的一组目标值。
message FriendSharedPlanSet {
  string weight_text = 1;
  string reps_text = 2;
}

// FriendSharedPlanExercise 是好友分享计划中的动作配置。
message FriendSharedPlanExercise {
  string exercise_id = 1;
  string name_key = 2;
  string name_snapshot = 3;
  string category_key = 4;
  string type_key = 5;
  string display_type_key = 6;
  string custom_name = 7;
  string custom_subcategory_key = 8;
  string note = 9;
  int32 set_count = 10;
  string weight_unit = 11;
  repeated FriendSharedPlanSet sets = 12;
  string custom_introduction = 13;
}

// FriendSharedPlan 是可由接收方复制到自己计划文件夹的只读计划快照。
message FriendSharedPlan {
  string title = 1;
  repeated FriendSharedPlanExercise exercises = 2;
  // 分享者本地计划 ID，用于归属同一计划的使用积分。
  string source_plan_id = 3;
}

// FriendPlanShareNotification 是一条待处理的好友计划分享通知。
message FriendPlanShareNotification {
  string id = 1;
  uint64 from_uid = 2;
  string from_user_id = 3;
  string nickname = 4;
  string avatar_symbol = 5;
  FriendSharedPlan plan = 6;
  int64 created_at = 7;
}

enum FriendPlanShareDisposition {
  FRIEND_PLAN_SHARE_DISPOSITION_UNKNOWN = 0;
  // 已确认复制到自己的计划文件夹。
  FRIEND_PLAN_SHARE_DISPOSITION_USED = 1;
  // 未使用并忽略。
  FRIEND_PLAN_SHARE_DISPOSITION_IGNORED = 2;
}

// MyTrainingPublicSnapshot 表示当前用户公开给好友看的训练摘要。
message MyTrainingPublicSnapshot {
  // 当前用户是否公开训练数据。
  bool visible = 1;
  // 连续训练天数。
  int32 spark_days = 2;
  // 近 30 次训练摘要。
  repeated FriendTrainingDaySummary recent_training_days = 3;
  // 快照生成/更新时间，Unix 毫秒。
  int64 updated_at = 4;
}

// ListFriendsRequest 请求当前用户的好友列表。
message ListFriendsRequest {}

// ListFriendsResponse 返回好友列表以及当前用户训练数据公开状态。
message ListFriendsResponse {
  // 好友列表，客户端按昵称首字母分组展示。
  repeated FriendListItem friends = 1;
  // 当前用户是否已公开自己的训练数据。
  bool my_training_data_visible = 2;
}

// AddFriendRequest 通过好友 ID 发起好友申请。
message AddFriendRequest {
  // 对方的好友 ID，不是 uid。
  string friend_user_id = 1;
}

// AddFriendResponse 返回好友申请提交结果。
message AddFriendResponse {
  // 是否提交成功。
  bool success = 1;
  // 服务端返回的展示文案，例如“申请已发送”。
  string message = 2;
}

// ListFriendRequestsRequest 请求当前用户收到的好友申请列表。
message ListFriendRequestsRequest {}

// ListFriendRequestsResponse 返回好友申请列表。
message ListFriendRequestsResponse {
  // 好友申请列表，可包含已处理申请；客户端只对 pending 展示红点。
  repeated FriendRequest requests = 1;
  // 尚未使用或忽略的好友计划分享通知。
  repeated FriendPlanShareNotification plan_shares = 2;
}

// HandleFriendRequestRequest 处理一条好友申请。
message HandleFriendRequestRequest {
  // 好友申请 ID。
  string request_id = 1;
  // true 表示同意，false 表示拒绝。
  bool accept = 2;
}

// HandleFriendRequestResponse 返回处理结果。
message HandleFriendRequestResponse {
  // 是否处理成功。
  bool success = 1;
}

// SendFriendPlanShareRequest 给一位现有好友分享计划。
message SendFriendPlanShareRequest {
  uint64 to_uid = 1;
  // 客户端生成的幂等 ID，队列重试时保持不变。
  string client_share_id = 2;
  FriendSharedPlan plan = 3;
}

message SendFriendPlanShareResponse {
  bool success = 1;
  string share_id = 2;
}

// HandleFriendPlanShareRequest 在真正复制完成或明确忽略后处理通知。
message HandleFriendPlanShareRequest {
  string share_id = 1;
  FriendPlanShareDisposition disposition = 2;
}

message HandleFriendPlanShareResponse {
  bool success = 1;
}

// RecordFriendTrainingUseRequest 在好友训练被确认保存为自己的计划后增加一次使用积分。
message RecordFriendTrainingUseRequest {
  // 每次用户确认保存生成一个新 ID；只用于网络重试幂等，不限制同一用户重复使用。
  string client_event_id = 1;
  uint64 source_uid = 2;
  string training_session_id = 3;
}

message RecordFriendTrainingUseResponse {
  bool success = 1;
}

// UpdateTrainingDataVisibilityRequest 设置当前用户是否公开训练数据。
message UpdateTrainingDataVisibilityRequest {
  // true 表示公开，false 表示关闭公开。
  bool visible = 1;
  // 同步公开状态时附带当前训练快照；关闭公开时可传 visible=false 的空快照。
  MyTrainingPublicSnapshot snapshot = 2;
}

// UpdateTrainingDataVisibilityResponse 返回服务端最终保存的公开状态。
message UpdateTrainingDataVisibilityResponse {
  // 服务端最终确认的公开状态。
  bool visible = 1;
}

// UploadMyTrainingPublicSnapshotRequest 上传当前用户最新公开训练快照。
// 用于公开状态已打开后，训练或标签变化时更新好友可见数据。
message UploadMyTrainingPublicSnapshotRequest {
  // 最新训练快照。
  MyTrainingPublicSnapshot snapshot = 1;
}

// UploadMyTrainingPublicSnapshotResponse 返回快照上传结果。
message UploadMyTrainingPublicSnapshotResponse {
  // 是否上传成功。
  bool success = 1;
}

// GetFriendEntryStatusRequest 请求好友入口轻量状态。
// 该接口用于进入 app/记录页时决定好友按钮是否显示红点或蓝点，不拉完整好友列表。
message GetFriendEntryStatusRequest {}

// GetFriendEntryStatusResponse 返回好友入口状态。
message GetFriendEntryStatusResponse {
  // 是否存在未处理好友申请，用于红点。
  bool has_pending_request = 1;
  // 未处理好友申请数量。
  int32 pending_request_count = 2;
  // 当前用户是否公开训练数据；客户端结合本地更新时间判断是否显示蓝点。
  bool my_training_data_visible = 3;
  // 是否存在好友申请或计划分享通知。
  bool has_pending_notification = 4;
  // 好友申请与计划分享通知总数。
  int32 pending_notification_count = 5;
}

// GetMyFriendProfileRequest 请求当前用户自己的朋友资料。
message GetMyFriendProfileRequest {}

// GetMyFriendProfileResponse 返回当前用户自己的朋友资料。
message GetMyFriendProfileResponse {
  // 当前用户资料；朋友查看该用户资料时也使用同类字段展示。
  FriendProfile profile = 1;
}

// GetFriendProfileRequest 请求某个好友的完整朋友资料。
message GetFriendProfileRequest {
  // 对方 uid。
  uint64 uid = 1;
}

// GetFriendProfileResponse 返回好友完整资料和训练数据。
message GetFriendProfileResponse {
  // 好友完整资料。
  FriendProfile profile = 1;
}

// UpdateMyFriendProfileRequest 修改当前用户自己的朋友资料。
message UpdateMyFriendProfileRequest {
  // 展示昵称。
  string nickname = 1;
  // 客户端内置头像名。
  string avatar_symbol = 2;
  // 个人简介。
  string bio = 3;
  // 训练计划标题。
  string plan_title = 4;
  // 训练计划说明。
  string plan_description = 5;
}

// UpdateMyFriendProfileResponse 返回服务端最终保存的朋友资料。
message UpdateMyFriendProfileResponse {
  // 更新后的当前用户资料。
  FriendProfile profile = 1;
}

// UpdateFriendRemarkRequest 修改好友备注名。
message UpdateFriendRemarkRequest {
  // 好友的 uid。
  uint64 uid = 1;
  // 备注名，为空时清除备注。
  string remark = 2;
}

// UpdateFriendRemarkResponse 返回备注更新结果。
message UpdateFriendRemarkResponse {
  // 是否更新成功。
  bool success = 1;
}

service FriendService {
  // 获取好友列表。
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse);
  // 通过好友 ID 发送好友申请。
  rpc AddFriend(AddFriendRequest) returns (AddFriendResponse);
  // 获取当前用户收到的好友申请。
  rpc ListFriendRequests(ListFriendRequestsRequest) returns (ListFriendRequestsResponse);
  // 同意或拒绝好友申请。
  rpc HandleFriendRequest(HandleFriendRequestRequest) returns (HandleFriendRequestResponse);
  // 给现有好友分享一份计划。
  rpc SendFriendPlanShare(SendFriendPlanShareRequest) returns (SendFriendPlanShareResponse);
  // 将计划分享标记为已使用或已忽略，并进行带原因的软删除。
  rpc HandleFriendPlanShare(HandleFriendPlanShareRequest) returns (HandleFriendPlanShareResponse);
  // 记录好友训练被保存为计划的一次使用积分。
  rpc RecordFriendTrainingUse(RecordFriendTrainingUseRequest) returns (RecordFriendTrainingUseResponse);
  // 设置当前用户训练数据是否公开。
  rpc UpdateTrainingDataVisibility(UpdateTrainingDataVisibilityRequest) returns (UpdateTrainingDataVisibilityResponse);
  // 上传当前用户公开训练快照。
  rpc UploadMyTrainingPublicSnapshot(UploadMyTrainingPublicSnapshotRequest) returns (UploadMyTrainingPublicSnapshotResponse);
  // 获取好友入口红点/蓝点所需的轻量状态。
  rpc GetFriendEntryStatus(GetFriendEntryStatusRequest) returns (GetFriendEntryStatusResponse);
  // 获取某个好友的完整资料和训练数据。
  rpc GetFriendProfile(GetFriendProfileRequest) returns (GetFriendProfileResponse);
  // 获取当前用户自己的朋友资料。
  rpc GetMyFriendProfile(GetMyFriendProfileRequest) returns (GetMyFriendProfileResponse);
  // 修改当前用户自己的朋友资料。
  rpc UpdateMyFriendProfile(UpdateMyFriendProfileRequest) returns (UpdateMyFriendProfileResponse);
  // 修改好友备注名。
  rpc UpdateFriendRemark(UpdateFriendRemarkRequest) returns (UpdateFriendRemarkResponse);
}
