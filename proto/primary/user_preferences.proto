syntax = "proto3";

package api;

option go_package = "spider/api;api";

// UserPreferences 表示用户级外观和界面偏好。
message UserPreferences {
  uint64 id = 1;
  uint64 uid = 2;
  string theme = 3;
  int32 theme_opacity = 4;
  string calendar_light_palette = 5;
  string calendar_dark_palette = 6;
  bool hides_navigation_title_spark = 7;
  int32 schema_version = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
  int32 history_calendar_day_card_width = 11;
}

message SaveUserPreferencesRequest {
  UserPreferences preferences = 1;
}

message SaveUserPreferencesResponse {
  UserPreferences preferences = 1;
}

service UserPreferencesService {
  rpc SaveUserPreferences(SaveUserPreferencesRequest) returns (SaveUserPreferencesResponse);
}
